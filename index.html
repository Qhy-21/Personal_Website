    <main>
      <section id="intro" class="section section-intro">
        <div class="intro-left">
          <div class="intro-title">

          <p class="intro-text">

            一名全栈学习者，既能写后端接口，也能在前端挥洒创意。
          </p>
          <div class="intro-actions">
            <a href="projects.html" class="btn btn-primary">查看作品</a>
            <a href="contact.html" class="btn btn-ghost">联络我</a>
          </div>
          <div class="intro-meta">

          </div>
        </div>
        <div class="intro-right">
          <div class="pixel-card avatar-card">
            <button type="button" class="avatar-pixel" id="avatarPreviewTrigger" aria-label="查看头像大图">
            </button>
            <div class="avatar-info">
              <div class="avatar-name">羌花吟</div>
              <div class="avatar-desc">Java / CS / Words</div>
              <div class="avatar-status">「正在加载新的可能性…」</div>
              <a href="contact.html" class="btn btn-sm">了解更多</a>
            </div>
          </div>
          <div class="pixel-card mood-card">
            <div class="card-label">今日心情 · PIXEL MOOD</div>
            <p class="mood-text"> 127.0.0.1 </p>

    <footer class="pixel-footer">

        <span>© <span id="year"></span> 羌花吟 </span>
      </div>
      <div class="footer-right">
        <span>Made with ♥ in a pixel world.</span>
        <span>在像素世界中用 ♥ 制作</span>

    <div class="avatar-modal" id="avatarModal" aria-hidden="true">

        <img src="avatar.png" alt="羌花吟头像大图" class="avatar-modal-image">
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const interests = [
      { text: '全栈开发', weight: 5 },
      { text: '电影', weight: 3 },
      { text: '动漫', weight: 4 },
      { text: 'EVA', weight: 5 },
      { text: '小说', weight: 3 },
      { text: '记录', weight: 2 },
      { text: 'Think', weight: 4 },
      { text: 'Murakami Haruki', weight: 5 },
      { text: 'Vae', weight: 4 },
      { text: '许嵩', weight: 4 },
      { text: '纯音乐', weight: 3 },
      { text: '失眠症晚期患者', weight: 2 },
      { text: '不良人', weight: 4 },
      { text: '世界尽头与冷酷仙境', weight: 3 },
      { text: '葛城美里', weight: 5 },
      { text: '碇真嗣', weight: 5 }
    ];

    const colors = [
      '#ffb3c6', '#ff9999', '#ffcc99', '#ffff99', 
      '#99ff99', '#99ffff', '#99ccff', '#cc99ff',
      '#ff99cc', '#ff6666', '#ff9966', '#ffcc66',
      '#66ffcc', '#66ccff', '#cc66ff', '#ff66b3'
    ];

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function createInterestCloud() {
      const container = document.getElementById('interestCloud');
      const shuffledInterests = shuffleArray(interests);
      
      shuffledInterests.forEach((item, index) => {
        const span = document.createElement('span');
        span.className = 'cloud-tag';
        span.textContent = item.text;
        
        const baseSize = 14 + item.weight * 4;
        const sizeVariation = Math.random() * 8;
        const finalSize = baseSize + sizeVariation;
        span.style.fontSize = finalSize + 'px';
        
        const color = colors[index % colors.length];
        span.style.color = color;
        span.style.textShadow = `0 0 10px ${color}80`;
        
        const rotation = (Math.random() - 0.5) * 20;
        span.style.transform = `rotate(${rotation}deg)`;
        
        container.appendChild(span);
      });
    }

    createInterestCloud();
  </script>
</body>

</html>
