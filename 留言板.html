<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 · 温润书卷</title>
    <style>
        :root {
            --bg: #faf8f5;
            --card-bg: #ffffff;
            --text: #3d3a35;
            --text-secondary: #7a7368;
            --text-muted: #a9a39a;
            --border: #e8e3db;
            --accent: #b8956a;
            --accent-hover: #a07848;
            --accent-light: #f5efe6;
            --input-bg: #faf8f5;
            --input-focus: #f0ebe2;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.08);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-serif: 'Georgia', 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', 'KaiTi', serif;
            --font-sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px 60px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .guestbook-container {
            width: 100%;
            max-width: 680px;
        }

        /* 头部 */
        .guestbook-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .guestbook-header .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent-light);
            margin-bottom: 16px;
            font-size: 26px;
            color: var(--accent);
        }

        .guestbook-header h1 {
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin-bottom: 6px;
        }

        .guestbook-header .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        /* 统计条 */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 0 4px;
        }

        .stats-bar .count {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stats-bar .count span {
            color: var(--accent);
            font-weight: 600;
        }

        .divider-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border);
        }

        /* ========== 留言列表（在上方） ========== */
        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        /* 折叠按钮 */
        .collapse-toggle {
            text-align: center;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .btn-collapse {
            background: none;
            border: 1.5px solid var(--border);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: all var(--transition);
            background: var(--card-bg);
        }

        .btn-collapse:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        /* 单条留言卡片 */
        .message-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 22px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid transparent;
            transition: all var(--transition);
            animation: fadeInUp 0.45s ease forwards;
            opacity: 0;
        }

        .message-card.collapsed-item {
            display: none;
        }

        .message-card:nth-child(1) { animation-delay: 0.05s; }
        .message-card:nth-child(2) { animation-delay: 0.12s; }
        .message-card:nth-child(3) { animation-delay: 0.19s; }
        .message-card:nth-child(4) { animation-delay: 0.26s; }
        .message-card:nth-child(5) { animation-delay: 0.33s; }

        .message-card:hover {
            border-color: var(--border);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .avatar {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            color: #fff;
            letter-spacing: 0.04em;
            user-select: none;
        }

        .avatar.av-0 { background: #c4a882; }
        .avatar.av-1 { background: #8aa6b0; }
        .avatar.av-2 { background: #b8947a; }
        .avatar.av-3 { background: #9eae7a; }
        .avatar.av-4 { background: #b08a9e; }
        .avatar.av-5 { background: #7a9eb8; }
        .avatar.av-6 { background: #c49a6c; }
        .avatar.av-7 { background: #7dada4; }

        .msg-meta {
            flex: 1;
            min-width: 0;
        }
        .msg-meta .msg-name {
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.02em;
        }
        .msg-meta .msg-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .msg-body {
            font-size: 14px;
            line-height: 1.75;
            letter-spacing: 0.02em;
            word-break: break-word;
        }

        .msg-footer-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid #f3f0ea;
        }

        .btn-reply {
            font-size: 12px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: color var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-reply:hover { color: var(--accent); }

        .reply-area {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            animation: fadeInUp 0.25s ease;
        }
        .reply-area.hidden { display: none; }

        .reply-area input {
            flex: 1;
            font-family: var(--font-sans);
            font-size: 13px;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            background: var(--input-bg);
            outline: none;
            transition: all var(--transition);
        }
        .reply-area input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(184, 149, 106, 0.06);
        }
        .btn-send-reply {
            padding: 9px 16px;
            background: var(--accent-light);
            color: var(--accent);
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: all var(--transition);
        }
        .btn-send-reply:hover { background: var(--accent); color: #fff; }

        .replies-list {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .reply-item {
            background: #faf8f4;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            border-left: 3px solid var(--accent-light);
            animation: fadeInUp 0.3s ease;
        }
        .reply-item .reply-author {
            font-weight: 600;
            color: var(--accent);
            font-size: 12px;
            margin-bottom: 2px;
        }

        /* ========== 表单卡片（在下方） ========== */
        .form-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 28px 30px 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            transition: box-shadow var(--transition);
            margin-top: 8px;
        }
        .form-card:focus-within {
            box-shadow: var(--shadow-lg);
            border-color: #d5c9b6;
        }

        .form-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.02em;
        }
        .form-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* 垂直排列，每个字段独立一行 */
        .input-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            text-align: left;          /* 文字左对齐，保证对齐 */
        }

        .input-group input,
        .input-group textarea {
            font-family: var(--font-sans);
            font-size: 14px;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            transition: all var(--transition);
            width: 100%;               /* 输入框等宽 */
            box-sizing: border-box;
        }

        .input-group textarea {
            min-height: 150px;         /* 加大留言内容区域 */
            resize: vertical;
            line-height: 1.6;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--accent);
            background: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(184, 149, 106, 0.08);
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: #c4beb5;
            font-size: 13px;
        }

        .form-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
        }

        .char-hint {
            font-size: 11px;
            color: var(--text-muted);
        }

        .btn-submit {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 22px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .btn-submit:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(160, 120, 72, 0.25);
        }
        .btn-submit:active { transform: scale(0.97); }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #4a6741;
            color: #fff;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.02em;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
            z-index: 1000;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* 响应式 */
        @media (max-width: 600px) {
            body { padding: 24px 12px 40px; }
            .guestbook-header h1 { font-size: 24px; }
            .form-card { padding: 20px 16px 18px; border-radius: var(--radius); }
            .input-group input,
            .input-group textarea { font-size: 16px; }
            .message-card { padding: 16px; border-radius: var(--radius-sm); }
            .avatar { width: 34px; height: 34px; font-size: 13px; }
            .btn-submit { padding: 10px 18px; font-size: 13px; }
            .stats-bar { flex-wrap: wrap; gap: 6px; }
        }

        @media (max-width: 380px) {
            .form-footer {
                flex-direction: column-reverse;
                gap: 10px;
                align-items: stretch;
            }
            .btn-submit { justify-content: center; width: 100%; }
            .char-hint { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="guestbook-container">
        <!-- 头部 -->
        <header class="guestbook-header">
            <div class="icon-wrapper">✉️</div>
            <h1>留言板</h1>
            <p class="subtitle">欢迎留下你的足迹和声音</p>
        </header>

        <!-- 统计条 -->
        <div class="stats-bar">
            <span class="count">共 <span id="msgCount">5</span> 条留言</span>
            <span class="divider-dot"></span>
            <span class="count" style="font-size:12px;color:var(--text-muted);">期待你的分享</span>
        </div>

        <!-- ========== 留言列表（上） ========== -->
        <div class="messages-list" id="messagesList"></div>
        <!-- 折叠/展开按钮 -->
        <div class="collapse-toggle" id="collapseToggleContainer" style="display: none;">
            <button class="btn-collapse" id="btnToggleCollapse">查看全部留言</button>
        </div>

        <!-- ========== 留言表单（下） ========== -->
        <div class="form-card" id="formCard">
            <div class="form-title">写下留言</div>

            <!-- 昵称 -->
            <div class="input-group">
                <label for="inputName">昵称</label>
                <input type="text" id="inputName" placeholder="你的名字" maxlength="20" autocomplete="off">
            </div>

            <!-- 邮箱（选填） -->
            <div class="input-group">
                <label for="inputEmail">邮箱（选填）</label>
                <input type="email" id="inputEmail" placeholder="example@mail.com" autocomplete="off">
            </div>

            <!-- 留言内容 -->
            <div class="input-group">
                <label for="inputMessage">留言内容</label>
                <textarea id="inputMessage" placeholder="在这里写下你想说的话..." maxlength="500"></textarea>
            </div>

            <div class="form-footer">
                <span class="char-hint" id="charHint">0 / 500</span>
                <button class="btn-submit" id="btnSubmit">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <polyline points="19 12 12 19 5 12"></polyline>
                    </svg>
                    提交留言
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">✅ 留言发布成功！</div>

    <script>
        (function() {
            // 示例数据
            const sampleMessages = [
                { id: 1, name: '林间小路', email: '', content: '你好！偶然路过这个网站，设计得很舒服，内容也很有意思。期待看到更多更新～', timestamp: new Date('2026-07-02T14:30:00'), replies: [{ author: '站长', text: '谢谢你的鼓励！会持续更新的 😊', time: new Date('2026-07-02T18:10:00') }] },
                { id: 2, name: '夏天', email: 'summer@example.com', content: '照片拍得真好看，请问是用什么相机拍的呀？', timestamp: new Date('2026-07-03T09:15:00'), replies: [] },
                { id: 3, name: '旅行者阿飞', email: '', content: '从友链点过来的，文章写得很真诚。已经加入收藏夹，会常来看看。', timestamp: new Date('2026-07-04T16:42:00'), replies: [{ author: '站长', text: '欢迎常来坐坐 ☕', time: new Date('2026-07-04T20:05:00') }, { author: '旅行者阿飞', text: '哈哈好的，已经订阅RSS了', time: new Date('2026-07-05T08:22:00') }] },
                { id: 4, name: 'Mia', email: '', content: '想请教一下关于旅行的建议，有没有推荐的小众目的地？喜欢安静一点的地方。', timestamp: new Date('2026-07-05T11:00:00'), replies: [] },
                { id: 5, name: '老读者', email: 'reader@mail.com', content: '跟了三年了，从大学到现在工作，这个网站一直是我心里很安静的一个角落。感谢你的坚持。', timestamp: new Date('2026-07-05T22:08:00'), replies: [{ author: '站长', text: '看到这条留言真的很感动，谢谢你的陪伴。', time: new Date('2026-07-06T07:30:00') }] },
                { id: 6, name: '星尘', email: '', content: '安静的地方推荐云南沙溪，人少节奏慢，适合发呆。', timestamp: new Date('2026-07-05T23:20:00'), replies: [] },
                { id: 7, name: '过路人', email: 'passer@test.com', content: '加油，简单干净的网站越来越少了。', timestamp: new Date('2026-07-06T01:05:00'), replies: [] }
            ];

            const STORAGE_KEY = 'guestbook_messages_v2';
            const COLLAPSE_THRESHOLD = 5;   // 超过5条折叠

            let messages = [];
            let isCollapsed = true;          // 默认折叠状态

            function loadMessages() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        messages = parsed.map(m => ({
                            ...m,
                            timestamp: new Date(m.timestamp),
                            replies: (m.replies || []).map(r => ({ ...r, time: r.time ? new Date(r.time) : null }))
                        }));
                    } catch (e) {
                        messages = [...sampleMessages];
                    }
                } else {
                    messages = [...sampleMessages];
                }
                if (!stored) saveMessages();
            }

            function saveMessages() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            }

            function formatTime(date) {
                const diffMin = Math.floor((new Date() - date) / 60000);
                if (diffMin < 1) return '刚刚';
                if (diffMin < 60) return `${diffMin} 分钟前`;
                const diffHour = Math.floor(diffMin / 60);
                if (diffHour < 24) return `${diffHour} 小时前`;
                const diffDay = Math.floor(diffHour / 24);
                if (diffDay < 7) return `${diffDay} 天前`;
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            function formatTimeFull(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const h = String(date.getHours()).padStart(2, '0');
                const min = String(date.getMinutes()).padStart(2, '0');
                return `${y}-${m}-${d} ${h}:${min}`;
            }

            function getInitial(name) {
                const trimmed = (name || '').trim();
                return trimmed.length ? trimmed.charAt(0).toUpperCase() : '?';
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // 渲染留言列表（含折叠逻辑）
            function renderMessages() {
                const listEl = document.getElementById('messagesList');
                const countEl = document.getElementById('msgCount');
                const toggleContainer = document.getElementById('collapseToggleContainer');
                const toggleBtn = document.getElementById('btnToggleCollapse');

                countEl.textContent = messages.length;

                if (messages.length === 0) {
                    listEl.innerHTML = `<div style="text-align:center;padding:48px 20px;color:var(--text-muted);">
                        <div style="font-size:40px;margin-bottom:12px;">📝</div>
                        <p style="font-size:14px;">还没有留言，来当第一个吧～</p>
                    </div>`;
                    toggleContainer.style.display = 'none';
                    return;
                }

                // 构建所有留言卡片HTML
                const allCardsHTML = messages.map((msg, index) => {
                    const avatarClass = `av-${index % 8}`;
                    const initial = getInitial(msg.name);
                    const hasReplies = msg.replies && msg.replies.length > 0;
                    let repliesHTML = '';
                    if (hasReplies) {
                        repliesHTML = `<div class="replies-list">${msg.replies.map(r => `
                            <div class="reply-item">
                                <div class="reply-author">${escapeHTML(r.author)}</div>
                                <div>${escapeHTML(r.text)}</div>
                                ${r.time ? `<div style="font-size:10px;color:var(--text-muted);margin-top:3px;">${formatTimeFull(r.time)}</div>` : ''}
                            </div>`).join('')}</div>`;
                    }

                    // 折叠项添加类 collapsed-item
                    const collapseClass = (isCollapsed && index >= COLLAPSE_THRESHOLD) ? ' collapsed-item' : '';

                    return `<div class="message-card${collapseClass}" data-id="${msg.id}">
                        <div class="msg-header">
                            <div class="avatar ${avatarClass}">${initial}</div>
                            <div class="msg-meta">
                                <div class="msg-name">${escapeHTML(msg.name)}</div>
                                <div class="msg-time">${formatTime(msg.timestamp)}</div>
                            </div>
                        </div>
                        <div class="msg-body"><p>${escapeHTML(msg.content)}</p></div>
                        ${repliesHTML}
                        <div class="msg-footer-row">
                            <button class="btn-reply" data-id="${msg.id}" onclick="toggleReply(event, ${msg.id})">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
                                回复
                            </button>
                            <span style="font-size:11px;color:var(--text-muted);">#${index + 1}</span>
                        </div>
                        <div class="reply-area hidden" id="replyArea-${msg.id}">
                            <input type="text" id="replyInput-${msg.id}" placeholder="写下回复..." maxlength="200" onkeydown="handleReplyKey(event, ${msg.id})">
                            <button class="btn-send-reply" onclick="submitReply(${msg.id})">发送</button>
                        </div>
                    </div>`;
                }).join('');

                listEl.innerHTML = allCardsHTML;

                // 控制折叠按钮显示
                if (messages.length > COLLAPSE_THRESHOLD) {
                    toggleContainer.style.display = 'block';
                    toggleBtn.textContent = isCollapsed ? `查看全部 ${messages.length} 条留言` : '收起留言';
                } else {
                    toggleContainer.style.display = 'none';
                }
            }

            function updateCount() {
                document.getElementById('msgCount').textContent = messages.length;
            }

            // 折叠/展开切换
            function setupCollapseToggle() {
                const btn = document.getElementById('btnToggleCollapse');
                btn.addEventListener('click', () => {
                    isCollapsed = !isCollapsed;
                    renderMessages();   // 重新渲染以应用/取消隐藏
                });
            }

            // 表单逻辑
            const inputMessage = document.getElementById('inputMessage');
            const charHint = document.getElementById('charHint');
            const inputName = document.getElementById('inputName');
            const inputEmail = document.getElementById('inputEmail');
            const btnSubmit = document.getElementById('btnSubmit');

            inputMessage.addEventListener('input', () => {
                const len = inputMessage.value.length;
                charHint.textContent = `${len} / 500`;
                charHint.style.color = len > 450 ? '#c97a5a' : 'var(--text-muted)';
            });

            btnSubmit.addEventListener('click', () => {
                const name = inputName.value.trim();
                const email = inputEmail.value.trim();
                const content = inputMessage.value.trim();

                if (!name) { shakeElement(inputName); showToast('请填写昵称'); return; }
                if (!content) { shakeElement(inputMessage); showToast('请填写留言内容'); return; }
                if (content.length < 2) { shakeElement(inputMessage); showToast('留言内容至少2个字符'); return; }
                if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    shakeElement(inputEmail); showToast('邮箱格式不正确'); return;
                }

                const newMsg = {
                    id: Date.now(),
                    name, email, content,
                    timestamp: new Date(),
                    replies: []
                };

                messages.unshift(newMsg);
                saveMessages();

                // 新留言加入后，自动展开全部（让用户看到自己刚发的）
                isCollapsed = false;
                renderMessages();
                updateCount();

                inputName.value = '';
                inputEmail.value = '';
                inputMessage.value = '';
                charHint.textContent = '0 / 500';
                charHint.style.color = 'var(--text-muted)';

                setTimeout(() => {
                    const firstCard = document.querySelector('.message-card');
                    if (firstCard) firstCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 150);

                showToast('✅ 留言发布成功！');
            });

            inputMessage.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    btnSubmit.click();
                }
            });

            function shakeElement(el) {
                el.style.transition = 'transform 0.1s ease';
                el.style.transform = 'translateX(-4px)';
                setTimeout(() => el.style.transform = 'translateX(4px)', 100);
                setTimeout(() => el.style.transform = 'translateX(-3px)', 200);
                setTimeout(() => el.style.transform = 'translateX(0)', 300);
                el.focus();
            }

            // Toast
            let toastTimer;
            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
            }

            // 回复相关（全局函数）
            window.toggleReply = function(event, msgId) {
                event.stopPropagation();
                const area = document.getElementById(`replyArea-${msgId}`);
                const input = document.getElementById(`replyInput-${msgId}`);
                if (area.classList.contains('hidden')) {
                    document.querySelectorAll('.reply-area').forEach(a => a.classList.add('hidden'));
                    area.classList.remove('hidden');
                    setTimeout(() => input.focus(), 100);
                } else {
                    area.classList.add('hidden');
                }
            };

            window.handleReplyKey = function(event, msgId) {
                if (event.key === 'Enter') { event.preventDefault(); submitReply(msgId); }
                if (event.key === 'Escape') { document.getElementById(`replyArea-${msgId}`).classList.add('hidden'); }
            };

            window.submitReply = function(msgId) {
                const input = document.getElementById(`replyInput-${msgId}`);
                const text = input.value.trim();
                if (!text) { showToast('请输入回复内容'); return; }
                const msg = messages.find(m => m.id === msgId);
                if (!msg) return;
                if (!msg.replies) msg.replies = [];
                msg.replies.push({ author: '站长', text, time: new Date() });
                saveMessages();
                renderMessages();
                updateCount();
                showToast('✅ 回复成功！');
            };

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.reply-area') && !e.target.closest('.btn-reply')) {
                    document.querySelectorAll('.reply-area').forEach(a => a.classList.add('hidden'));
                }
            });

            // 初始化
            loadMessages();
            renderMessages();
            updateCount();
            setupCollapseToggle();

            // 重置工具
            window.resetGuestbook = function() {
                if (confirm('确定要重置留言板为示例数据吗？')) {
                    localStorage.removeItem(STORAGE_KEY);
                    messages = [...sampleMessages];
                    isCollapsed = true;   // 重置后默认折叠
                    saveMessages();
                    renderMessages();
                    updateCount();
                    showToast('🔄 已重置为示例数据');
                }
            };
        })();
    </script>
</body>
</html>
